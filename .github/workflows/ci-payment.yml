# CI: payment servis — unit, integracioni i funkcionalni testovi pri svakom push-u.
name: CI Payment

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment
    services:
      redis:
        # redis-om sa index=True zahteva RediSearch (Redis Stack)
        image: redis/redis-stack-server:7.4.0-v8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalacija zavisnosti
        run: pip install -r requirements-dev.txt
      - name: Pytest
        run: pytest tests -v
